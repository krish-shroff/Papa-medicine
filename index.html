<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Medicine Tracker Pro</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #74ebd5, #9face6);
    margin: 0;
    padding: 20px;
}

h1 {
    text-align: center;
    color: white;
}

.container {
    max-width: 900px;
    margin: auto;
}

.form {
    background: white;
    padding: 15px;
    border-radius: 12px;
    display: grid;
    gap: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

input, select, button {
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    background: #4CAF50;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #45a049;
}

.grid {
    margin-top: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 15px;
}

.card {
    background: white;
    border-radius: 12px;
    padding: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}

.card h3 {
    margin: 5px 0 10px;
    color: #333;
}

.medicine {
    background: #f0f4ff;
    padding: 8px;
    margin: 5px 0;
    border-radius: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.low {
    background: #ffe0e0;
}

.controls button {
    margin-left: 5px;
    padding: 5px 8px;
    font-size: 12px;
}

.delete {
    background: red;
}

.reduce {
    background: orange;
}
</style>

</head>
<body>

<h1>💊 Medicine Tracker Pro</h1>

<div class="container">

<div class="form">
    <input type="text" id="name" placeholder="Medicine Name">
    <input type="number" id="quantity" placeholder="Quantity">

    <select id="time">
        <option>Before Breakfast</option>
        <option>After Breakfast</option>
        <option>Before Lunch</option>
        <option>After Lunch</option>
        <option>Before Dinner</option>
        <option>After Dinner</option>
    </select>

    <button onclick="addMedicine()">Add Medicine</button>
</div>

<div class="grid" id="grid"></div>

</div>

<script>
let medicines = JSON.parse(localStorage.getItem("medicines_v2")) || [];

const categories = [
    "Before Breakfast",
    "After Breakfast",
    "Before Lunch",
    "After Lunch",
    "Before Dinner",
    "After Dinner"
];

function save() {
    localStorage.setItem("medicines_v2", JSON.stringify(medicines));
}

function addMedicine() {
    let name = document.getElementById("name").value;
    let quantity = parseInt(document.getElementById("quantity").value);
    let time = document.getElementById("time").value;

    if (!name || !quantity) {
        alert("Fill all fields!");
        return;
    }

    medicines.push({ name, quantity, time });
    save();
    render();

    document.getElementById("name").value = "";
    document.getElementById("quantity").value = "";
}

function deleteMedicine(index) {
    medicines.splice(index, 1);
    save();
    render();
}

function reduceQuantity(index) {
    if (medicines[index].quantity > 0) {
        medicines[index].quantity--;
        save();
        render();
    }
}

function render() {
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    categories.forEach(cat => {
        let card = document.createElement("div");
        card.className = "card";

        let title = document.createElement("h3");
        title.innerText = cat;
        card.appendChild(title);

        medicines.forEach((med, index) => {
            if (med.time === cat) {
                let div = document.createElement("div");

                div.className = "medicine";
                if (med.quantity <= 2) div.classList.add("low");

                div.innerHTML = `
                    <span>${med.name} (${med.quantity})</span>
                    <div class="controls">
                        <button class="reduce" onclick="reduceQuantity(${index})">-1</button>
                        <button class="delete" onclick="deleteMedicine(${index})">X</button>
                    </div>
                `;

                card.appendChild(div);
            }
        });

        grid.appendChild(card);
    });
}

render();
</script>

</body>
</html>
